9: f64,\n    memory_usage: usize,\n    cpu_usage: f64,\n    cache_misses: u64,\n    branch_misses: u64,\n    temporal_score_avg: f64,\n    index_size: usize,\n    simd_utilization: f64,\n    memory_bandwidth: f64,\n}\n\nimpl std::fmt::Display for BenchMetrics {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(f, \"\\\n            📊 Performance Metrics:\\n\\\n            ├─ Throughput: {:.2} ops/s\\n\\\n            ├─ Latency (ms):\\n\\\n            │  ├─ p50: {:.2}\\n\\\n            │  ├─ p95: {:.2}\\n\\\n            │  └─ p99: {:.2}\\n\\\n            ├─ Memory: {:.2} MB\\n\\\n            ├─ CPU: {:.1}%\\n\\\n            ├─ Cache Stats:\\n\\\n            │  ├─ Cache Misses: {}\\n\\\n            │  └─ Branch Misses: {}\\n\\\n            ├─ Temporal Score: {:.3}\\n\\\n            ├─ SIMD Utilization: {:.2}%\\n\\\n            ├─ Memory Bandwidth: {:.2} GB/s\\n\\\n            └─ Index Size: {} vectors\",\n            self.throughput,\n            self.latency_p50,\n            self.latency_p95,\n            self.latency_p99,\n            self.memory_usage as f64 / 1_048_576.0,\n            self.cpu_usage,\n            self.cache_misses,\n            self.branch_misses,\n            self.temporal_score_avg,\n            self.simd_utilization,\n            self.memory_bandwidth,\n            self.index_size\n        )\n    }\n}\n\n#[cfg(target_arch = \"x86_64\")]\nmod vector_ops {\n    use super::*;\n    \n    #[target_feature(enable = \"avx512f\")]\n    unsafe fn create_realistic_vector(id: \u0026str, dims: usize, context: \u0026str, importance: f32) -\u003e TemporalVector {\n        let mut rng = thread_rng();\n        let normal = Normal::new(0.0, 1.0).unwrap();\n        let mut data = Vec::with_capacity(dims);\n        \n        // Generate random values using AVX-512\n        for _ in (0..dims).step_by(16) {\n            let simd_vec = _mm512_set_ps(\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n                normal.sample(\u0026mut rng) as f32,\n            );\n            \n            let mut aligned_buf = vec![0_f32; 16];\n            _mm512_store_ps(aligned_buf.as_mut_ptr(), simd_vec);\n            data.extend_from_slice(\u0026aligned_buf);\n        }\n        \n        // Normalize using SIMD\n        let norm = unsafe { simd_l2_norm(\u0026data) };\n        data.iter_mut().for_each(|x| *x /= norm);\n        \n        TemporalVector {\n            id: id.to_string(),\n            vector: Vector::new(data),\n            attributes: MemoryAttributes {\n                context: context.to_string(),\n                importance,\n                created_at: SystemTime::now(),\n                last_accessed: SystemTime::now(),\n                access_count: 0,\n            },\n        }\n    }\n    \n    #[target_feature(enable = \"avx512f\")]\n    unsafe fn simd_l2_norm(data: \u0026[f32]) -\u003e f32 {\n        let mut sum = _mm512_setzero_ps();\n        \n        for chunk in data.chunks_exact(16) {\n            let v = _mm512_loadu_ps(chunk.as_ptr());\n            sum = _mm512_fmadd_ps(v, v, sum);\n        }\n        \n        _mm512_reduce_add_ps(sum).sqrt()\n    }\n}\n\n/// Thread-safe benchmark state for both MemoryStorage and HNSW\nstruct BenchState {\n    memory_storage: Arc\u003cRwLock\u003cMemoryStorage\u003e\u003e,\n    hnsw_index: Arc\u003cRwLock\u003cTemporalHNSW\u003e\u003e,\n    runtime: Runtime,\n    monitor: PerformanceMonitor,\n}\n\nimpl BenchState {\n    fn new(size: usize) -\u003e Self {\n        let config = MemoryConfig::default();\n        let metric = Arc::new(CosineDistance::new());\n        \n        let memory_storage = MemoryStorage::new(metric.clone(), config.clone()).unwrap();\n        \n        let hnsw_config = HNSWConfig {\n            ef_construction: config::HNSW_PARAMS.ef_construction,\n            ef_search: config::HNSW_PARAMS.ef_search,\n            m: config::HNSW_PARAMS.m,\n            ml: config::HNSW_PARAMS.ml,\n            ..Default::default()\n        };\n        \n        let hnsw_index = TemporalHNSW::new(hnsw_config, metric);\n\n        BenchState {\n            memory_storage: Arc::new(RwLock::new(memory_storage)),\n            hnsw_index: Arc::new(RwLock::new(hnsw_index)),\n            runtime: Runtime::new().unwrap(),\n            monitor: PerformanceMonitor::new(),\n        }\n    }\n\n    fn batch_insert(\u0026self, size: usize) {\n        let vectors: Vec\u003c_\u003e = (0..size)\n            .into_par_iter()\n            .map(|i| unsafe {\n                vector_ops::create_realistic_vector(\n                    \u0026format!(\"v{}\", i),\n                    config::DIMS,\n                    \"benchmark\",\n                    thread_rng().gen_range(0.0..1.0),\n                )\n            })\n            .collect();\n\n        // Insert into both storages\n        let memory_storage = self.memory_storage.clone();\n        let hnsw_index = self.hnsw_index.clone();\n        \n        self.runtime.block_on(async {\n            let mut tasks = Vec::new();\n            \n            for v in vectors {\n                let ms = memory_storage.clone();\n                let hi = hnsw_index.clone();\n                \n                tasks.push(tokio::spawn(async move {\n                    ms.write().insert_memory(v.clone()).unwrap();\n                    hi.write().insert(\u0026v).unwrap();\n                }));\n            }\n            \n            join_all(tasks).await\n        });\n    }\n\n    async fn concurrent_search(\u0026self, queries: \u0026[Vec\u003cf32\u003e], k: usize) {\n        let memory_storage = self.memory_storage.clone();\n        let hnsw_index = self.hnsw_index.clone();\n        \n        let mut tasks = Vec::new();\n        \n        for query in queries {\n            let ms = memory_storage.clone();\n            let hi = hnsw_index.clone();\n            let q = query.clone();\n            \n            tasks.push(tokio::spawn(async move {\n                let _ = ms.read().search_similar(\u0026q, k).await.unwrap();\n                let _ = hi.read().search(\u0026q, k).unwrap();\n            }));\n        }\n        \n        join_all(tasks).await;\n    }\n\n    fn update_decay(\u0026self) {\n        let duration = Duration::from_secs(3600); // 1 hour decay\n        self.runtime.block_on(async {\n            self.memory_storage.write().apply_decay(duration).unwrap();\n        });\n    }\n\n    fn temporal_operations(\u0026self, contexts: \u0026[String]) {\n        self.runtime.block_on(async {\n            let storage = self.memory_storage.clone();\n            \n            // Test context-based operations\n            for ctx in contexts {\n                let _ = storage.read().search_by_context(ctx, \u0026vec![0.0; config::DIMS], 10).await.unwrap();\n                let _ = storage.read().compress_memories(ctx).unwrap();\n            }\n            \n            // Test temporal decay and consolidation\n            storage.write().apply_decay(Duration::from_secs(3600)).unwrap();\n            storage.write().consolidate_memories().unwrap();\n        });\n    }\n}\n\nmod benchmarks {\n    use super::*;\n    \n    pub fn bench_memory_operations(c: \u0026mut Criterion) {\n        let mut group = c.benchmark_group(\"Memory Operations\");\n        group.warm_up_time(config::WARM_UP_TIME);\n        group.measurement_time(config::MEASUREMENT_TIME);\n        group.sample_size(config::MIN_SAMPLE_SIZE);\n        \n        for \u0026size in \u0026config::BATCH_SIZES {\n            group.bench_with_input(BenchmarkId::new(\"Batch Insert\", size), \u0026size, |b, \u0026s| {\n                let state = get_bench_state(s);\n                b.iter(|| state.batch_insert(s));\n            });\n            \n            group.bench_with_input(BenchmarkId::new(\"Concurrent Search\", size), \u0026size, |b, \u0026s| {\n                let state = get_bench_state(s);\n                let queries = generate_query_vectors(s);\n                b.iter(|| state.concurrent_search(\u0026queries, 10));\n            });\n        }\n        \n        group.finish();\n    }\n    \n    pub fn bench_temporal_features(c: \u0026mut Criterion) {\n        let mut group = c.benchmark_group(\"Temporal Features\");\n        group.warm_up_time(config::WARM_UP_TIME);\n        group.measurement_time(config::MEASUREMENT_TIME);\n        group.sample_size(config::MIN_SAMPLE_SIZE);\n        \n        let contexts = vec![\"context1\".to_string(), \"context2\".to_string()];\n        \n        for \u0026size in \u0026config::BATCH_SIZES {\n            group.bench_with_input(BenchmarkId::new(\"Temporal Decay\", size), \u0026size, |b, \u0026s| {\n                let state = get_bench_state(s);\n                b.iter(|| state.update_decay());\n            });\n            \n            group.bench_with_input(BenchmarkId::new(\"Context Operations\", size), \u0026size, |b, \u0026s| {\n                let state = get_bench_state(s);\n                b.iter(|| state.temporal_operations(\u0026contexts));\n            });\n        }\n        \n        group.finish();\n    }\n    \n    pub fn bench_hnsw_features(c: \u0026mut Criterion) {\n        let mut group = c.benchmark_group(\"HNSW Features\");\n        group.warm_up_time(config::WARM_UP_TIME);\n        group.measurement_time(config::MEASUREMENT_TIME);\n        group.sample_size(config::MIN_SAMPLE_SIZE);\n        \n        for \u0026size in \u0026config::BATCH_SIZES {\n            group.bench_with_input(BenchmarkId::new(\"Graph Construction\", size), \u0026size, |b, \u0026s| {\n                let state = get_bench_state(s);\n                b.iter(|| state.build_hnsw_graph());\n            });\n            \n            group.bench_with_input(BenchmarkId::new(\"Similarity Search\", size), \u0026size, |b, \u0026s| {\n                let state = get_bench_state(s);\n                let query = generate_query_vectors(1)[0].clone();\n                b.iter(|| state.hnsw_search(\u0026query, 10));\n            });\n        }\n        \n        group.finish();\n    }\n}\n\nstatic BENCH_STATE: OnceCell\u003cMutex\u003cVec\u003c(usize, Arc\u003cBenchState\u003e)\u003e\u003e\u003e = OnceCell::new();\n\nfn get_bench_state(size: usize) -\u003e Arc\u003cBenchState\u003e {\n    let states = BENCH_STATE.get_or_init(|| Mutex::new(Vec::new()));\n    let mut states = states.lock();\n    \n    if let Some(state) = states.iter().find(|(s, _)| *s == size) {\n        state.1.clone()\n    } else {\n        let state = Arc::new(BenchState::new(size));\n        states.push((size, state.clone()));\n        state\n    }\n}\n\nfn generate_query_vectors(size: usize) -\u003e Vec\u003cVec\u003cf32\u003e\u003e {\n    (0..size)\n        .into_par_iter()\n        .map(|_| {\n            let mut rng = thread_rng();\n            let normal = Normal::new(0.0, 1.0).unwrap();\n            let mut data = Vec::with_capacity(config::DIMS);\n            \n            for _ in 0..config::DIMS {\n                data.push(normal.sample(\u0026mut rng) as f32);\n            }\n            \n            data\n        })\n        .collect()\n}\n\ncriterion_group!(\n    name = benches;\n    config = Criterion::default()\n        .with_plots()\n        .sample_size(config::MIN_SAMPLE_SIZE);\n    targets = \n        benchmarks::bench_memory_operations,\n        benchmarks::bench_temporal_features,\n        benchmarks::bench_hnsw_features,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","jt","chrono-mind","benches","common","mod.rs"],"content":"use criterion::{Criterion, measurement::WallTime};\nuse rand::prelude::*;\nuse rand_distr::{Normal, Uniform};\nuse std::time::{SystemTime, Duration};\n\n#[derive(Debug, Clone)]\npub enum MetricType {\n    Latency,    // Response time in milliseconds\n    Throughput, // Queries per second\n    Accuracy,   // Precision@K for search results\n    Memory,     // Memory usage in MB\n}\n\n/// Query patterns to simulate different real-world scenarios\n#[derive(Debug, Clone, Copy)]\npub enum QueryPattern {\n    ExactMatch,   // Exact content retrieval\n    Semantic,     // Semantic similarity search\n    Hybrid,       // Combination of exact and semantic\n}\n\n/// Model dimensions based on popular embedding models\npub mod config {\n    pub const DIMS_BERT_BASE: usize = 768;    // BERT base model\n    pub const DIMS_ADA_002: usize = 1536;     // OpenAI ada-002\n    pub const DIMS_E5_LARGE: usize = 1024;    // E5 large model\n    pub const DIMS_MINILM: usize = 384;       // MiniLM model\n\n    // Dataset sizes for benchmarking\n    pub const DATASET_SMALL: usize = 10_000;    // 10K vectors\n    pub const DATASET_MEDIUM: usize = 100_000;  // 100K vectors\n    pub const DATASET_LARGE: usize = 1_000_000; // 1M vectors\n\n    // Importance configurations for temporal aspects\n    pub const IMPORTANCE_CONFIGS: [(f32, \u0026str); 4] = [\n        (1.0, \"critical\"),     // High importance, immediate recall needed\n        (0.8, \"important\"),    // Important but not critical\n        (0.5, \"normal\"),       // Standard importance\n        (0.2, \"background\"),   // Background/archival data\n    ];\n}\n\n/// Common query patterns for benchmarking\npub const QUERY_PATTERNS: [QueryPattern; 3] = [\n    QueryPattern::ExactMatch,\n    QueryPattern::Semantic,\n    QueryPattern::Hybrid,\n];\n\n/// Benchmark timing configurations\npub const WARM_UP_TIME: Duration = Duration::from_secs(3);\npub const MEASUREMENT_TIME: Duration = Duration::from_secs(10);\npub const MIN_SAMPLE_SIZE: usize = 50;\n\n/// Performance targets (metric type, target value)\npub const PERFORMANCE_TARGETS: [(MetricType, f32); 4] = [\n    (MetricType::Latency, 50.0),     // 50ms max latency\n    (MetricType::Throughput, 1000.0), // 1000 QPS\n    (MetricType::Accuracy, 0.95),     // 95% precision@10\n    (MetricType::Memory, 1024.0),     // 1GB max memory\n];\n\n/// Generate realistic embeddings that mimic production models\npub fn generate_realistic_embeddings(count: usize, model: \u0026str) -\u003e Vec\u003cVec\u003cf32\u003e\u003e {\n    let dim = match model {\n        \"bert-base\" =\u003e 768,\n        \"ada-002\" =\u003e 1536,\n        \"e5-large\" =\u003e 1024,\n        \"minilm\" =\u003e 384,\n        _ =\u003e 768, // default to BERT dimensions\n    };\n\n    let mut rng = rand::thread_rng();\n    let normal = Normal::new(0.0, 0.1).unwrap();\n    let mut embeddings = Vec::with_capacity(count);\n\n    for _ in 0..count {\n        // Generate vectors with realistic properties:\n        // 1. Most values close to 0 (normal distribution)\n        // 2. Some semantic clusters\n        // 3. Sparse activation patterns\n        let mut vec = Vec::with_capacity(dim);\n        for _ in 0..dim {\n            let val = normal.sample(\u0026mut rng) as f32;\n            vec.push(val);\n        }\n        \n        // Normalize the vector\n        let magnitude = vec.iter()\n            .map(|x| x * x)\n            .sum::\u003cf32\u003e()\n            .sqrt();\n        \n        if magnitude \u003e 0.0 {\n            for x in \u0026mut vec {\n                *x /= magnitude;\n            }\n        }\n        \n        embeddings.push(vec);\n    }\n\n    embeddings\n}\n\n/// Generate temporal patterns that mimic real usage\npub fn generate_temporal_patterns(count: usize, pattern: \u0026str) -\u003e Vec\u003cSystemTime\u003e {\n    let now = SystemTime::now();\n    let mut timestamps = Vec::with_capacity(count);\n    let mut rng = rand::thread_rng();\n\n    match pattern {\n        \"recent\" =\u003e {\n            // Most vectors added in last 24 hours\n            let dist = Uniform::new(0, 24 * 3600);\n            for _ in 0..count {\n                let age = dist.sample(\u0026mut rng);\n                timestamps.push(now - Duration::from_secs(age));\n            }\n        },\n        \"mixed\" =\u003e {\n            // Mix of recent and older vectors\n            let recent_dist = Uniform::new(0, 7 * 24 * 3600);\n            let medium_dist = Uniform::new(7 * 24 * 3600, 30 * 24 * 3600);\n            let old_dist = Uniform::new(30 * 24 * 3600, 365 * 24 * 3600);\n\n            for i in 0..count {\n                let age = if i % 10 \u003c 7 {\n                    // 70% recent (last week)\n                    recent_dist.sample(\u0026mut rng)\n                } else if i % 10 \u003c 9 {\n                    // 20% medium age (last month)\n                    medium_dist.sample(\u0026mut rng)\n                } else {\n                    // 10% old (last year)\n                    old_dist.sample(\u0026mut rng)\n                };\n                timestamps.push(now - Duration::from_secs(age));\n            }\n        },\n        \"uniform\" =\u003e {\n            // Uniform distribution over last year\n            let dist = Uniform::new(0, 365 * 24 * 3600);\n            for _ in 0..count {\n                let age = dist.sample(\u0026mut rng);\n                timestamps.push(now - Duration::from_secs(age));\n            }\n        },\n        _ =\u003e {\n            // Default to mixed pattern\n            let dist = Uniform::new(0, 30 * 24 * 3600);\n            for _ in 0..count {\n                let age = dist.sample(\u0026mut rng);\n                timestamps.push(now - Duration::from_secs(age));\n            }\n        }\n    }\n\n    timestamps\n}\n\n/// Setup benchmark group with consistent configuration\npub fn setup_benchmark_group\u003c'a\u003e(c: \u0026'a mut Criterion, name: \u0026str) -\u003e criterion::BenchmarkGroup\u003c'a, WallTime\u003e {\n    let mut group = c.benchmark_group(name);\n    group.warm_up_time(WARM_UP_TIME);\n    group.measurement_time(MEASUREMENT_TIME);\n    group.sample_size(MIN_SAMPLE_SIZE);\n    group\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_realistic_embeddings() {\n        let vectors = generate_realistic_embeddings(10, \"bert-base\");\n        assert_eq!(vectors.len(), 10);\n        assert_eq!(vectors[0].len(), 768);\n\n        // Verify unit vectors\n        for vec in vectors {\n            let magnitude = vec.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n            assert!((magnitude - 1.0).abs() \u003c 1e-6);\n        }\n    }\n\n    #[test]\n    fn test_temporal_patterns() {\n        let now = std::time::SystemTime::now();\n        \n        // Test chat history pattern\n        let times = generate_temporal_patterns(100, \"recent\");\n        assert_eq!(times.len(), 100);\n        for time in times {\n            assert!(time \u003c= now);\n            assert!(time \u003e= now - Duration::from_secs(24 * 3600));\n        }\n\n        // Test knowledge base pattern\n        let times = generate_temporal_patterns(100, \"mixed\");\n        assert_eq!(times.len(), 100);\n        for time in times {\n            assert!(time \u003c= now);\n            assert!(time \u003e= now - Duration::from_secs(365 * 24 * 3600));\n        }\n    }\n}\n","traces":[{"line":163,"address":[],"length":0,"stats":{"Line":0}},{"line":164,"address":[],"length":0,"stats":{"Line":0}},{"line":165,"address":[],"length":0,"stats":{"Line":0}},{"line":166,"address":[],"length":0,"   storage::{\n        hnsw::{HNSWConfig, TemporalHNSW},\n        metrics::CosineDistance,\n    },\n    memory::types::{Vector, TemporalVector, MemoryAttributes},\n};\nuse crate::{RUNTIME, common::{config, generate_realistic_embeddings, generate_temporal_patterns, QueryPattern}};\n\n/// HNSW configurations based on production use cases\nconst HNSW_CONFIGS: [(usize, usize, usize); 3] = [\n    // M, ef_construction, ef_search - tuned for different scenarios\n    (16, 100, 50),   // Fast search (high QPS)\n    (32, 200, 100),  // Balanced (default)\n    (48, 400, 200),  // High accuracy\n];\n\n/// Helper function to normalize vector\nfn normalize_vector(vec: \u0026[f32]) -\u003e Vec\u003cf32\u003e {\n    let magnitude = vec.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n    if magnitude \u003e 0.0 {\n        vec.iter().map(|x| x / magnitude).collect()\n    } else {\n        vec.to_vec()\n    }\n}\n\n/// Benchmark HNSW index operations\npub fn bench_hnsw_operations(c: \u0026mut Criterion) {\n    // Test different embedding models\n    let models = [\"bert-base\", \"ada-002\", \"e5-large\", \"minilm\"];\n    \n    for model in models {\n        let mut group = c.benchmark_group(format!(\"hnsw_ops_{}\", model));\n        \n        // Test different HNSW configurations\n        for \u0026(m, ef_construction, _ef_search) in HNSW_CONFIGS.iter() {\n            let config_name = match (m, ef_construction) {\n                (16, 100) =\u003e \"fast\",\n                (32, 200) =\u003e \"balanced\",\n                (48, 400) =\u003e \"accurate\",\n                _ =\u003e \"custom\",\n            };\n            \n            // Initialize HNSW index\n            let metric = Arc::new(CosineDistance::new());\n            let config = HNSWConfig {\n                max_dimensions: 128,\n                max_connections: 16,       // Increased for better recall\n                ef_construction: 200,      // Higher ef for better quality\n                ef_search: 50,            // Balance between speed and recall\n                temporal_weight: 0.5,     // Balance between recency and relevance\n            };\n            \n            // Test with different dataset sizes\n            let datasets = [\n                (\"small\", config::DATASET_SMALL),\n                (\"medium\", config::DATASET_MEDIUM),\n                (\"large\", config::DATASET_LARGE),\n            ];\n            \n            for (size, count) in datasets {\n                // Generate realistic test data\n                let test_vectors = generate_realistic_embeddings(count, model);\n                let timestamps = generate_temporal_patterns(count, \"mixed\");\n                \n                // Benchmark index construction\n                let bench_name = format!(\"build_{}_{}\", size, config_name);\n                group.bench_function(\u0026bench_name, |b| {\n                    b.iter(|| {\n                        let hnsw = Arc::new(TemporalHNSW::new(config.clone(), metric.clone()));\n                        \n                        RUNTIME.block_on(async {\n                            for (i, (vec, _timestamp)) in test_vectors.iter().zip(timestamps.iter()).enumerate() {\n                                let (importance, _) = config::IMPORTANCE_CONFIGS[i % config::IMPORTANCE_CONFIGS.len()];\n                                \n                                let vector = Vector::new(\n                                    format!(\"{}_{}_{}_{}\", model, size, config_name, i),\n                                    normalize_vector(vec), // Normalize the vector before insertion\n                                );\n                                \n                                let attrs = MemoryAttributes {\n                                    timestamp: std::time::SystemTime::now(),\n                                    importance,\n                                    context: format!(\"context_{}\", i % 10),\n                                    decay_rate: 0.1,\n                                    relationships: Vec::new(),\n                                    access_count: 0,\n                                    last_access: std::time::SystemTime::now(),\n                                };\n                                \n                                let temporal = TemporalVector::new(vector, attrs);\n                                let _ = hnsw.insert(\u0026temporal).await.expect(\"Failed to insert vector\");\n                            }\n                        });\n                        \n                        black_box(hnsw)\n                    });\n                });\n                \n                // Create index for search benchmarks\n                let mut hnsw = Arc::new(TemporalHNSW::new(config.clone(), metric.clone()));\n                let config = HNSWConfig {\n                    max_dimensions: test_vectors[0].len(),\n                    max_connections: 16,       // Increased for better recall\n                    ef_construction: 200,      // Higher ef for better quality\n                    ef_search: 50,            // Balance between speed and recall\n                    temporal_weight: 0.5,     // Balance between recency and relevance\n                };\n                RUNTIME.block_on(async {\n                    for (i, (vec, _timestamp)) in test_vectors.iter().zip(timestamps.iter()).enumerate() {\n                        let (importance, _) = config::IMPORTANCE_CONFIGS[i % config::IMPORTANCE_CONFIGS.len()];\n                        \n                        let vector = Vector::new(\n                            format!(\"vector_{}\", i),  // Unique ID for each vector\n                            normalize_vector(vec), // Normalize the vector before insertion\n                        );\n                        \n                        let temporal = TemporalVector::new(\n                            vector,\n                            MemoryAttributes {\n                                timestamp: std::time::SystemTime::now(),\n                                importance,\n                                context: format!(\"context_{}\", i % 10),\n                                decay_rate: 0.1,\n                                relationships: Vec::new(),\n                                access_count: 0,\n                                last_access: std::time::SystemTime::now(),\n                            },\n                        );\n                        \n                        hnsw.insert(\u0026temporal).await.expect(\"Failed to insert vector\");\n                    }\n                });\n                \n                // Benchmark search with different patterns\n                for query_pattern in \u0026[QueryPattern::ExactMatch, QueryPattern::Semantic, QueryPattern::Hybrid] {\n                    let bench_name = format!(\"search_{}_{}_{:?}\", size, config_name, query_pattern);\n                    group.bench_function(\u0026bench_name, |b| {\n                        // Generate query based on pattern\n                        let query = match query_pattern {\n                            QueryPattern::ExactMatch =\u003e normalize_vector(\u0026test_vectors[0]), // Normalize the query vector\n                            QueryPattern::Semantic =\u003e {\n                                let mut q = test_vectors[0].clone();\n                                for x in q.iter_mut() {\n                                    *x += rand::random::\u003cf32\u003e() * 0.2;\n                                }\n                                normalize_vector(\u0026q)\n                            },\n                            QueryPattern::Hybrid =\u003e {\n                                let mut q = test_vectors[0].clone();\n                                for x in q.iter_mut() {\n                                    *x += rand::random::\u003cf32\u003e() * 0.1;\n                                }\n                                normalize_vector(\u0026q)\n                            },\n                        };\n                        \n                        b.iter(|| {\n                            RUNTIME.block_on(async {\n                                let k = match query_pattern {\n                                    QueryPattern::ExactMatch =\u003e 1,     // Single best match\n                                    QueryPattern::Semantic =\u003e 10,      // Multiple similar results\n                                    QueryPattern::Hybrid =\u003e 5,         // Balance precision/recall\n                                };\n                                \n                                let results = black_box(hnsw.search(\u0026query, k).await.expect(\"Search failed\"));\n                                assert!(!results.is_empty(), \"Search returned no results\");\n                                \n                                // Validate search quality\n                                match query_pattern {\n                                    QueryPattern::ExactMatch =\u003e {\n                                        // Should find exact match with high similarity\n                                        assert!(results[0].1 \u003e= 0.0, \"Distance should be non-negative\");\n                                        assert!(results[0].1 \u003c 0.1, \"Distance too high for exact match\");\n                                    },\n                                    QueryPattern::Semantic =\u003e {\n                                        // Should find semantically similar results\n                                        assert!(results.iter().all(|(_, d)| *d \u003e= 0.0), \"Distances should be non-negative\");\n                                        assert!(results[0].1 \u003c 0.5, \"Top result distance too high for semantic match\");\n                                    },\n                                    QueryPattern::Hybrid =\u003e {\n                                        // Mix of close and similar results\n                                        assert!(results.iter().all(|(_, d)| *d \u003e= 0.0), \"Distances should be non-negative\");\n                                        assert!(results[0].1 \u003c 0.3, \"Top result distance too high for hybrid match\");\n                                    },\n                                }\n                            });\n                        });\n                    });\n                }\n            }\n        }\n        \n        group.finish();\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","jt","chrono-mind","benches","main.rs"],"content":"use criterion::{criterion_group, criterion_main, Criterion};\nuse once_cell::sync::Lazy;\nuse tokio::runtime::Runtime;\nuse std::time::SystemTime;\nuse indicatif::{ProgressBar, ProgressStyle};\nuse colored::*;\n\nmod common;\nmod memory;\nmod temporal;\nmod hnsw;\n\npub static RUNTIME: Lazy\u003cRuntime\u003e = Lazy::new(|| {\n    Runtime::new().unwrap()\n});\n\npub fn run_async\u003cF, R\u003e(future: F) -\u003e R \nwhere\n    F: std::future::Future\u003cOutput = R\u003e,\n{\n    RUNTIME.block_on(future)\n}\n\nfn print_benchmark_header(name: \u0026str) {\n    println!(\"\\n{}\", \"╔═══════════════════════════════════════════════════════════════╗\".bright_blue());\n    println!(\"║ {:\u003c61} ║\", format!(\"🚀 {}\", name).bright_white());\n    println!(\"{}\", \"╚═══════════════════════════════════════════════════════════════╝\".bright_blue());\n}\n\nfn create_progress_bar(name: String, total: u64) -\u003e ProgressBar {\n    let pb = ProgressBar::new(total);\n    pb.set_style(\n        ProgressStyle::default_bar()\n            .template(\"{spinner:.green} [{elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} ({eta})\")\n            .expect(\"Failed to create progress bar template\")\n            .progress_chars(\"#\u003e-\")\n    );\n    pb.set_message(name);\n    pb\n}\n\npub fn run_benchmarks(c: \u0026mut criterion::Criterion) {\n    println!(\"{}\", \"\\n🔬 Vector Store Benchmark Suite\".bright_green().bold());\n    println!(\"{}\", \"============================\".bright_green());\n    \n    let start_time = SystemTime::now();\n    \n    // Memory Operations Benchmarks\n    print_benchmark_header(\"Memory Operations\");\n    let pb = create_progress_bar(\"Running memory benchmarks\".to_string(), 100);\n    memory::bench_memory_operations(c);\n    pb.finish_with_message(\"Memory benchmarks completed\");\n    \n    // Temporal Operations Benchmarks\n    print_benchmark_header(\"Temporal Operations\");\n    let pb = create_progress_bar(\"Running temporal benchmarks\".to_string(), 100);\n    temporal::bench_temporal_operations(c);\n    pb.finish_with_message(\"Temporal benchmarks completed\");\n    \n    // HNSW Operations Benchmarks\n    print_benchmark_header(\"HNSW Operations\");\n    let pb = create_progress_bar(\"Running HNSW benchmarks\".to_string(), 100);\n    hnsw::bench_hnsw_operations(c);\n    pb.finish_with_message(\"HNSW benchmarks completed\");\n    \n    if let Ok(elapsed) = SystemTime::now().duration_since(start_time) {\n        println!(\"\\n{}\", \"╔═══════════════════════════════════════════════════════════════╗\".bright_green());\n        println!(\"║ {:\u003c61} ║\", \"✨ Benchmark Summary\".bright_white());\n        println!(\"╟───────────────────────────────────────────────────────────────╢\");\n        println!(\"║ {:\u003c61} ║\", format!(\"Total Time: {:.2} seconds\", elapsed.as_secs_f64()).bright_yellow());\n        println!(\"║ {:\u003c61} ║\", \"All benchmarks completed successfully\".bright_green());\n        println!(\"{}\", \"╚═══════════════════════════════════════════════════════════════╝\".bright_green());\n    }\n}\n\ncriterion_group! {\n    name = benches;\n    config = Criterion::default()\n        .sample_size(10) // Reduced sample size for faster feedback\n        .measurement_time(std::time::Duration::from_secs(5))\n        .warm_up_time(std::time::Duration::from_secs(1));\n    targets = run_benchmarks\n}\ncriterion_main!(benches);\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":1},{"path":["/","home","jt","chrono-mind","benches","memory","mod.rs"],"content":"use criterion::{black_box, Criterion};\nuse std::sync::Arc;\nuse vector_store::{\n    core::{\n        config::MemoryConfig,\n    },\n    memory::{\n        temporal::MemoryStorage,\n        types::{Vector, TemporalVector, MemoryAttributes},\n    },\n    storage::metrics::CosineDistance,\n};\nuse crate::{RUNTIME, common::{config, generate_realistic_embeddings, generate_temporal_patterns, QueryPattern}};\n\n/// Compute cosine similarity between two vectors\nfn cosine_similarity(a: \u0026[f32], b: \u0026[f32]) -\u003e f32 {\n    let dot_product: f32 = a.iter().zip(b.iter()).map(|(x, y)| x * y).sum();\n    let norm_a: f32 = a.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n    let norm_b: f32 = b.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n    if norm_a \u003e 0.0 \u0026\u0026 norm_b \u003e 0.0 {\n        dot_product / (norm_a * norm_b)\n    } else {\n        0.0\n    }\n}\n\n/// Benchmark suite for memory operations in real-world scenarios\npub fn bench_memory_operations(c: \u0026mut Criterion) {\n    // Test with different embedding models\n    let models = [\"bert-base\", \"ada-002\", \"e5-large\", \"minilm\"];\n    \n    for model in models {\n        let mut group = c.benchmark_group(format!(\"memory_ops_{}\", model));\n        \n        // Initialize store with model-specific dimensions\n        let mut store = RUNTIME.block_on(async {\n            let metric = Arc::new(CosineDistance::new());\n            let dims = match model {\n                \"bert-base\" =\u003e config::DIMS_BERT_BASE,\n                \"ada-002\" =\u003e config::DIMS_ADA_002,\n                \"e5-large\" =\u003e config::DIMS_E5_LARGE,\n                \"minilm\" =\u003e config::DIMS_MINILM,\n                _ =\u003e unreachable!(),\n            };\n            \n            let config = MemoryConfig {\n                max_dimensions: dims,\n                ..MemoryConfig::default()\n            };\n            MemoryStorage::new(config, metric)\n        });\n        \n        // Test with different dataset sizes\n        let datasets = [\n            (\"small\", config::DATASET_SMALL),     // Personal KB\n            (\"medium\", config::DATASET_MEDIUM),   // Small business\n            (\"large\", config::DATASET_LARGE),     // Enterprise dept\n        ];\n        \n        for (size, count) in datasets {\n            // Generate realistic test data\n            let test_vectors = generate_realistic_embeddings(count, model);\n            \n            // Test different usage patterns\n            let patterns = [\n                \"chat_history\",      // Recent conversational data\n                \"knowledge_base\",    // Reference documentation\n                \"mixed\",            // Mixed content types\n            ];\n            \n            for pattern in patterns {\n                let timestamps = generate_temporal_patterns(count, pattern);\n                \n                // Initialize with test data\n                RUNTIME.block_on(async {\n                    for (i, (vec, timestamp)) in test_vectors.iter().zip(timestamps.iter()).enumerate() {\n                        let (importance, context) = config::IMPORTANCE_CONFIGS[i % config::IMPORTANCE_CONFIGS.len()];\n                        \n                        let id = format!(\"{}_{}_{}_{}\", model, size, pattern, i);\n                        let vector = Vector::new(\n                            id.clone(),\n                            vec.clone(),\n                        );\n                        \n                        let attrs = MemoryAttributes {\n                            timestamp: *timestamp,\n                            importance,\n                            context: context.to_string(),\n                            decay_rate: 0.1,\n                            relationships: Vec::new(),\n                            access_count: 0,\n                            last_access: std::time::SystemTime::now(),\n                        };\n                        \n                        let temporal = TemporalVector::new(vector, attrs);\n                        store.save_memory(temporal).await.expect(\"Failed to save memory\");\n                    }\n                });\n                \n                // Benchmark different query scenarios\n                for query_pattern in \u0026[QueryPattern::ExactMatch, QueryPattern::Semantic, QueryPattern::Hybrid] {\n                    let bench_name = format!(\"search_{}_{}_{:?}\", size, pattern, query_pattern);\n                    group.bench_function(\u0026bench_name, |b| {\n                        b.iter(|| {\n                            // Generate query based on pattern\n                            let query = match query_pattern {\n                                QueryPattern::ExactMatch =\u003e test_vectors[0].clone(),\n                                QueryPattern::Semantic =\u003e {\n                                    let mut q = test_vectors[0].clone();\n                                    for x in q.iter_mut() {\n                                        *x += rand::random::\u003cf32\u003e() * 0.2; // Reduced noise for more similar results\n                                    }\n                                    let magnitude = q.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n                                    if magnitude \u003e 0.0 {\n                                        q.iter_mut().for_each(|x| *x /= magnitude);\n                                    }\n                                    q\n                                },\n                                QueryPattern::Hybrid =\u003e {\n                                    let mut q = test_vectors[0].clone();\n terion) {\n    let mut group = c.benchmark_group(\"temporal_operations\");\n    \n    // Setup\n    let mut store = RUNTIME.block_on(async {\n        let metric = Arc::new(CosineDistance::new());\n        MemoryStorage::new(MemoryConfig::default(), metric)\n    });\n    \n    // Setup test data\n    let test_vectors = (0..100).map(|i| {\n        let vector = Vector::new(\n            format!(\"test_{}\", i),\n            vec![0.1, 0.2, 0.3],\n        );\n        let attrs = MemoryAttributes {\n            timestamp: std::time::SystemTime::now(),\n            importance: 1.0,\n            context: \"test_context\".to_string(),\n            decay_rate: 0.1,\n            relationships: Vec::new(),\n            access_count: 0,\n            last_access: std::time::SystemTime::now(),\n        };\n        TemporalVector::new(vector, attrs)\n    }).collect::\u003cVec\u003c_\u003e\u003e();\n    \n    // Initialize with test data\n    RUNTIME.block_on(async {\n        for vector in \u0026test_vectors {\n            let _ = store.save_memory(vector.clone()).await;\n        }\n    });\n    \n    // Benchmark get_related_memories\n    group.bench_function(\"get_related_memories\", |b| {\n        b.iter(|| {\n            RUNTIME.block_on(async {\n                let _ = black_box(store.get_related_memories(\"test_0\", 2).await);\n            });\n        });\n    });\n    \n    // Benchmark search_by_context\n    group.bench_function(\"search_by_context\", |b| {\n        b.iter(|| {\n            let query = vec![0.1, 0.2, 0.3];\n            RUNTIME.block_on(async {\n                let _ = black_box(store.search_by_context(\"test_context\", \u0026query, 10).await);\n            });\n        });\n    });\n    \n    group.finish();\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","jt","chrono-mind","src","core","config.rs"],"content":"use serde::{Deserialize, Serialize};\nuse std::time::Duration;\nuse crate::core::error::{MemoryError, Result};\n\n/// Configuration for the memory system\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct MemoryConfig {\n    /// Maximum number of dimensions for vectors\n    pub max_dimensions: usize,\n    \n    /// Maximum number of memories to store\n    pub max_memories: usize,\n    \n    /// Minimum importance threshold for keeping memories\n    pub min_importance: f32,\n    \n    /// Maximum importance value\n    pub max_importance: f32,\n    \n    /// Base decay rate for memories (per hour)\n    pub base_decay_rate: f32,\n    \n    /// Weight for temporal scoring (0.0 to 1.0)\n    pub temporal_weight: f32,\n    \n    /// Similarity threshold for establishing relationships\n    pub similarity_threshold: f32,\n    \n    /// Maximum number of relationships per memory\n    pub max_relationships: usize,\n    \n    /// Time window for memory consolidation (in hours)\n    pub consolidation_window: Duration,\n    \n    /// Number of similar memories to consider for relationships\n    pub similar_memory_count: usize,\n    \n    /// Maximum size of context window\n    pub max_context_window: usize,\n}\n\nimpl Default for MemoryConfig {\n    fn default() -\u003e Self {\n        Self {\n            max_dimensions: 768,  // BERT base dimensions\n            max_memories: 1000,\n            min_importance: 0.0,\n            max_importance: 1.0,\n            base_decay_rate: 0.1,\n            temporal_weight: 0.3,  // 30% weight for temporal scoring\n            similarity_threshold: 0.8,\n            max_relationships: 50,\n            consolidation_window: Duration::from_secs(24 * 3600), // 24 hours\n            similar_memory_count: 10,\n            max_context_window: 1000,\n        }\n    }\n}\n\nimpl MemoryConfig {\n    /// Create a new configuration with custom settings\n    pub fn new(\n        max_dimensions: usize,\n        max_memories: usize,\n        max_relationships: usize,\n        base_decay_rate: f32,\n        consolidation_window: Duration,\n        min_importance: f32,\n        max_importance: f32,\n        similar_memory_count: usize,\n        similarity_threshold: f32,\n        max_context_window: usize,\n        temporal_weight: f32,\n    ) -\u003e Self {\n        Self {\n            max_dimensions,\n            max_memories,\n            max_relationships,\n            base_decay_rate,\n            consolidation_window,\n            min_importance,\n            max_importance,\n            similar_memory_count,\n            similarity_threshold,\n            max_context_window,\n            temporal_weight,\n        }\n    }\n\n    /// Validate the configuration\n    pub fn validate(\u0026self) -\u003e Result\u003c()\u003e {\n        if self.max_dimensions == 0 {\n            return Err(MemoryError::ConfigError(\n                \"Max dimensions must be greater than 0\".to_string(),\n            ));\n        }\n\n        if self.max_memories == 0 {\n            return Err(MemoryError::ConfigError(\n                \"Max memories must be greater than 0\".to_string(),\n            ));\n        }\n\n        if self.min_importance \u003c 0.0 || self.min_importance \u003e 1.0 {\n            return Err(MemoryError::ConfigError(\n                \"Min importance must be between 0 and 1\".to_string(),\n            ));\n        }\n\n        if self.max_importance \u003c self.min_importance || self.max_importance \u003e 1.0 {\n            return Err(MemoryError::ConfigError(\n                \"Max importance must be between min importance and 1\".to_string(),\n            ));\n        }\n\n        if self.base_decay_rate \u003c= 0.0 || self.base_decay_rate \u003e= 1.0 {\n            return Err(MemoryError::ConfigError(\n                \"Base decay rate must be between 0 and 1 (exclusive)\".to_string(),\n            ));\n        }\n\n        if self.similarity_threshold \u003c= 0.0 || self.similarity_threshold \u003e= 1.0 {\n            return Err(MemoryError::ConfigError(\n                \"Similarity threshold must be between 0 and 1 (exclusive)\".to_string(),\n            ));\n        }\n\n        if self.max_relationships == 0 {\n            return Err(MemoryError::ConfigError(\n                \"Max relationships must be greater than 0\".to_string(),\n            ));\n        }\n\n        if self.consolidation_window.as_secs() == 0 {\n            return Err(MemoryError::ConfigError(\n                \"Consolidation window must be greater than 0\".to_string(),\n            ));\n        }\n\n        if self.similar_memory_count == 0 {\n            return Err(MemoryError::ConfigError(\n                \"Similar memory count must be greater than 0\".to_string(),\n            ));\n        }\n\n        if self.max_context_window == 0 {\n            return Err(MemoryError::ConfigError(\n                \"Max context window must be greater than 0\".to_string(),\n            ));\n        }\n\n        if self.temporal_weight \u003c 0.0 || self.temporal_weight \u003e 1.0 {\n            return Err(MemoryError::ConfigError(\n                \"Temporal weight must be between 0 and 1\".to_string(),\n            ));\n        }\n\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_default_config() {\n        let config = MemoryConfig::default();\n        assert!(config.validate().is_ok());\n    }\n\n    #[test]\n    fn test_custom_config() {\n        let config = MemoryConfig::new(\n            768,\n            50_000,\n            25,\n            0.05,\n            Duration::from_secs(12 * 3600),\n            0.2,\n            0.9,\n            5,\n            0.7,\n            500,\n            0.4,\n        );\n        assert!(config.validate().is_ok());\n    }\n\n    #[test]\n    fn test_invalid_config() {\n        let mut config = MemoryConfig::default();\n        \n        config.max_dimensions = 0;\n        assert!(config.validate().is_err());\n        \n        config = MemoryConfig::default();\n        config.base_decay_rate = 1.5;\n        assert!(config / Initialize the vector store with custom configuration\npub fn init_with_config(config: MemoryConfig) -\u003e Result\u003cMemoryStorage\u003e {\n    // Validate configuration\n    if let Err(e) = config.validate() {\n        return Err(MemoryError::ConfigError(e.to_string()));\n    }\n    \n    // Initialize storage\n    let metric = Arc::new(CosineDistance::new());\n    let memory_config = config;\n    Ok(MemoryStorage::new(memory_config, metric))\n}\n\n/// Initialize memory store with custom distance metric\npub async fn init_memory_store(\n    distance_metric: Arc\u003cdyn crate::storage::metrics::DistanceMetric + Send + Sync\u003e,\n) -\u003e Result\u003cMemoryStorage\u003e {\n    let config = MemoryConfig::default();\n    config.validate()?;\n    let memory_config = config;\n    Ok(MemoryStorage::new(memory_config, distance_metric))\n}\n\n/// Save a memory to the store\npub async fn save_memory(store: \u0026mut MemoryStorage, memory: TemporalVector) -\u003e Result\u003c()\u003e {\n    store.save_memory(memory).await\n}\n\n/// Get a memory from the store by ID\npub async fn get_memory(store: \u0026MemoryStorage, id: \u0026str) -\u003e Result\u003cOption\u003cTemporalVector\u003e\u003e {\n    store.get_memory(id).await\n}\n\n/// Search for similar memories\npub async fn search_similar(\n    store: \u0026MemoryStorage,\n    query: \u0026[f32],\n    limit: usize,\n) -\u003e Result\u003cVec\u003c(TemporalVector, f32)\u003e\u003e {\n    store.search_similar(query, limit).await\n}\n\n/// Update memory decay\npub async fn update_memory_decay(store: \u0026mut MemoryStorage) -\u003e Result\u003c()\u003e {\n    store.update_memory_decay().await\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::config::MemoryConfig;\n\n    #[test]\n    fn test_init() {\n        assert!(init().is_ok());\n    }\n\n    #[test]\n    fn test_custom_config() {\n        let config = MemoryConfig::default();\n        assert!(init_with_config(config).is_ok());\n    }\n}\n"," s, ContextSummary, MemoryStats};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","jt","chrono-mind","src","memory","temporal.rs"],"content":"use std::{\n    collections::{HashMap, HashSet, VecDeque},\n    sync::Arc,\n    time::{Duration, SystemTime},\n};\nuse parking_lot::RwLock;\nuse crate::{\n    core::{\n        config::MemoryConfig,\n        error::{MemoryError, Result},\n    },\n    storage::metrics::{DistanceMetric, CosineDistance as MetricCosineDistance},\n    memory::types::TemporalVector,\n};\nuse hnsw_rs::{\n    hnsw::{Hnsw as HnswIndex, Neighbour},\n    dist::Distance,\n};\n\n#[derive(Clone)]\nstruct CosineDistance;\n\nimpl Distance\u003cVec\u003cf32\u003e\u003e for CosineDistance {\n    fn eval(\u0026self, a: \u0026[Vec\u003cf32\u003e], b: \u0026[Vec\u003cf32\u003e]) -\u003e f32 {\n        if a.is_empty() || b.is_empty() || a[0].len() != b[0].len() {\n            return f32::MAX;\n        }\n        \n        let va = \u0026a[0];\n        let vb = \u0026b[0];\n        \n        let mut dot_product = 0.0;\n        let mut norm_a = 0.0;\n        let mut norm_b = 0.0;\n        \n        for i in 0..va.len() {\n            dot_product += va[i] * vb[i];\n            norm_a += va[i] * va[i];\n            norm_b += vb[i] * vb[i];\n        }\n        \n        if norm_a == 0.0 || norm_b == 0.0 {\n            return f32::MAX;\n        }\n        \n        let similarity = dot_product / (norm_a.sqrt() * norm_b.sqrt());\n        // Convert similarity to distance (0 to MAX)\n        if similarity \u003e 1.0 {\n            0.0\n        } else if similarity \u003c -1.0 {\n            2.0\n        } else {\n            1.0 - similarity\n        }\n    }\n}\n\npub struct MemoryStorage {\n    config: MemoryConfig,\n    memories: RwLock\u003cHashMap\u003cString, TemporalVector\u003e\u003e,\n    distance_metric: Arc\u003cdyn DistanceMetric + Send + Sync\u003e,\n    hnsw: Hnsw, // Add HNSW index\n}\n\nimpl MemoryStorage {\n    pub fn new(\n        config: MemoryConfig,\n        distance_metric: Arc\u003cdyn DistanceMetric + Send + Sync\u003e,\n    ) -\u003e Self {\n        Self {\n            memories: RwLock::new(HashMap::new()),\n            config,\n            distance_metric,\n            hnsw: Hnsw::new(), // Initialize HNSW index\n        }\n    }\n\n    pub async fn save_memory(\u0026mut self, memory: TemporalVector) -\u003e Result\u003c()\u003e {\n        // Validate dimensions\n        if memory.vector.data.len() != self.config.max_dimensions {\n            return Err(MemoryError::InvalidDimensions {\n                got: memory.vector.data.len(),\n                expected: self.config.max_dimensions,\n            });\n        }\n\n        // Validate importance\n        if memory.attributes.importance \u003c 0.0 || memory.attributes.importance \u003e 1.0 {\n            return Err(MemoryError::InvalidImportance(memory.attributes.importance));\n        }\n\n        // Add to HNSW index first\n        self.hnsw.add(\u0026memory.vector.data, memory.vector.id.clone())\n            .map_err(|e| MemoryError::HnswError(e.to_string()))?;\n\n        // Then add to memory store\n        {\n            let mut memories = self.memories.write();\n\n            // If memory already exists, merge relationships\n            if let Some(existing) = memories.get(\u0026memory.vector.id) {\n                let mut updated = memory.clone();\n                let mut relationships: HashSet\u003c_\u003e = existing.attributes.relationships.iter().cloned().collect();\n                relationships.extend(updated.attributes.relationships.iter().cloned());\n                updated.attributes.relationships = relationships.into_iter().collect();\n                memories.insert(memory.vector.id.clone(), updated);\n            } else {\n                memories.insert(memory.vector.id.clone(), memory);\n            }\n        }\n\n        Ok(())\n    }\n\n    pub async fn get_memory(\u0026self, id: \u0026str) -\u003e Result\u003cOption\u003cTemporalVector\u003e\u003e {\n        let memories = self.memories.read();\n        Ok(memories.get(id).cloned())\n    }\n\n    pub async fn search_similar(\u0026self, query: \u0026[f32], k: usize) -\u003e Result\u003cVec\u003c(TemporalVector, f32)\u003e\u003e {\n        let memories = self.memories.read();\n        let now = SystemTime::now();\n\n        // Use HNSW for approximate nearest neighbor search\n        let candidates = self.hnsw.search(query, k * 2)?; // Get more candidates to account for temporal reranking\n        \n        // Convert results and apply temporal scoring\n        let mut results: Vec\u003c_\u003e = candidates.into_iter()\n            .filter_map(|(id, distance)| {\n                memories.get(\u0026id).map(|m| {\n                    let time_diff = now.duration_since(m.attributes.timestamp)\n                        .unwrap_or(Duration::from_secs(0))\n                        .as_secs_f32();\n                    \n                    // Temporal score: more recent = higher score (closer to 1)\n                    let temporal_score = (-self.config.base_decay_rate * time_diff).exp();\n                    \n                    // Distance is already normalized to [0, 2], temporal_score is [0, 1]\n                    // Scale temporal score to [0, 2] to match distance range\n                    let temporal_distance = 2.0 * (1.0 - temporal_score);\n                    \n                    // Combine distance and temporal scores with proper weighting\n                    let combined_score = \n                        distance * (1.0 - self.config.temporal_weight) + \n                        temporal_distance * self.config.temporal_weight;\n                    \n                    // Adjust score based on importance (higher importance = lower score)\n                    let final_score = combined_score / (1.0 + m.attributes.importance);\n                    \n                    (m.clone(), final_score)\n                })\n            })\n            .collect();\n        \n        // Sort by final score (lower is better)\n        results.sort_by(|(_, a), (_, b)| a.partial_cmp(b).unwrap_or(std::cmp::Ordering::Equal));\n        results.truncate(k);\n        \n        Ok(results)\n    }\n\n    pub async fn update_memory_decay(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let now = SystemTime::now();\n        let mut memories = self.memories.write();\n\n        for memory in memories.values_mut() {\n            let age = now.duration_since(memory.attributes.timestamp)\n                .unwrap_or(Duration::from_secs(0))\n                .as_secs() as f32 / 3600.0; // Convert to hours\n\n            let recency = now.duration_since(memory.attributes.last_access)\n                .unwrap_or(Duration::from_secs(0))\n                .as_secs() as f32 / 3600.0;\n\n            let access_factor = 1.0 / (1.0 + memory.attributes.access_count as f32).ln();\n            let decay = self.config.base_decay_rate * age * access_factor * recency;\n            \n            memory.attributes.importance = (memory.attributes.importance * (1.0 - decay))\n                .max(self.config.min_importance)\n                .min(self.config.max_importance);\n        }\n\n        Ok(())\n    }\n\n    pub async fn get_context_summary(\u0026self, context: \u0026str) -\u003e Result\u003cContextSummary\u003e {\n        let memories = self.memories.read();\n        let context_memories: Vec\u003c_\u003e = memories.values()\n            .filter(|m| m.attributes.context == context)\n            .collect();\n\n        if context_memories.is_empty() {\n            return Ok(ContextSummary {\n                memory_count: 0,\n                average_importance: 0.0,\n            });\n        }\n\n        Ok(ContextSummary {\n            memory_count: context_memories.len(),\n            average_importance: context_memories.iter()\n                .map(|m| m.attributes.importance)\n                .sum::\u003cf32\u003e() / context_memories.len() as f32,\n        })\n    }\n\n    pub async fn search_by_context(\u0026self, context: \u0026str, query: \u0026[f32], k: usize) -\u003e Result\u003cVec\u003c(TemporalVector, f32)\u003e\u003e {\n        let memories = self.memories.read();\n        let now = SystemTime::now();\n        \n        let context_memories: Vec\u003c_\u003e = memories.values()\n            .filter(|m| m.attributes.context == context)\n            .collect();\n        \n        let mut results: Vec\u003c_\u003e = context_memories.into_iter()\n            .map(|m| {\n                let distance = self.distance_metric.calculate_distance(\u0026m.vector.data, query);\n                let time_diff = now.duration_since(m.attributes.timestamp)\n                    .unwrap_or(Duration::from_secs(0))\n                    .as_secs_f32();\n                \n                // Temporal score: more recent = higher score (closer to 1)\n                let temporal_score = (-self.config.base_decay_rate * time_diff).exp();\n                \n                // Combine scores with configurable weights\n                let similarity_weight = 0.4;\n                let temporal_weight = 0.4;\n                let importance_weight = 0.2;\n                \n                let score = (distance * similarity_weight) -\n                           (temporal_score * temporal_weight) -\n                           (m.attributes.importance * importance_weight);\n                \n                (m.clone(), score)\n            })\n            .collect();\n        \n        results.sort_by(|a, b| a.1.partial_cmp(\u0026b.1).unwrap_or(std::cmp::Ordering::Equal));\n        results.truncate(k);\n        \n        Ok(results)\n    }\n\n    pub async fn get_related_memories(\u0026self, id: \u0026str, max_depth: usize) -\u003e Result\u003cVec\u003cTemporalVector\u003e\u003e {\n        let mut visited = HashSet::new();\n        let mut result = Vec::new();\n        let mut queue = VecDeque::new();\n\n        if   distance: f32,\n    #[allow(dead_code)]\n    temporal_score: f32,\n}\n\nimpl PartialEq for Candidate {\n    fn eq(\u0026self, other: \u0026Self) -\u003e bool {\n        self.id == other.id\n    }\n}\n\nimpl Eq for Candidate {}\n\nimpl PartialOrd for Candidate {\n    fn partial_cmp(\u0026self, other: \u0026Self) -\u003e Option\u003cstd::cmp::Ordering\u003e {\n        // Combine distance and temporal_score for comparison\n        // Lower distance and higher temporal_score is better\n        let self_score = self.distance / self.temporal_score;\n        let other_score = other.distance / other.temporal_score;\n        other_score.partial_cmp(\u0026self_score)\n    }\n}\n\nimpl Ord for Candidate {\n    fn cmp(\u0026self, other: \u0026Self) -\u003e std::cmp::Ordering {\n        self.partial_cmp(other).unwrap_or(std::cmp::Ordering::Equal)\n    }\n}\n\npub struct TemporalHNSW {\n    config: HNSWConfig,\n    nodes: RwLock\u003cHashMap\u003cString, Node\u003e\u003e,\n    entry_points: RwLock\u003cVec\u003cString\u003e\u003e,\n    distance_metric: Arc\u003cdyn DistanceMetric + Send + Sync\u003e,\n}\n\nimpl TemporalHNSW {\n    pub fn new(\n        config: HNSWConfig,\n        distance_metric: Arc\u003cdyn DistanceMetric + Send + Sync\u003e,\n    ) -\u003e Self {\n        Self {\n            config,\n            nodes: RwLock::new(HashMap::new()),\n            entry_points: RwLock::new(Vec::new()),\n            distance_metric,\n        }\n    }\n\n    /// Normalize a vector to unit length\n    fn normalize_vector(\u0026self, v: \u0026[f32]) -\u003e Vec\u003cf32\u003e {\n        let magnitude = v.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n        if magnitude \u003e 0.0 {\n            v.iter().map(|x| x / magnitude).collect()\n        } else {\n            v.to_vec()\n        }\n    }\n\n    pub async fn insert(\u0026self, temporal: \u0026TemporalVector) -\u003e Result\u003c()\u003e {\n        self.validate_dimensions(\u0026temporal.vector.data)?;\n\n        // Normalize vector before insertion\n        let normalized_vector = self.normalize_vector(\u0026temporal.vector.data);\n\n        let mut nodes = self.nodes.write().await;\n        let mut entry_points = self.entry_points.write().await;\n        let max_layer = self.get_random_layer();\n\n        // Calculate temporal score for the new node\n        let now = SystemTime::now();\n        let age = now.duration_since(temporal.attributes.timestamp)\n            .unwrap_or(Duration::from_secs(0))\n            .as_secs_f32();\n        let temporal_score = (-0.1 * age).exp();\n\n        let mut new_node = Node::new(\n            temporal.vector.id.clone(),\n            normalized_vector.clone(),  \n            max_layer,\n            temporal_score,\n        );\n        new_node.timestamp = temporal.attributes.timestamp;\n\n        let mut curr_ep = if let Some(ep) = entry_points.last() {\n            Some(ep.clone())\n        } else {\n            None\n        };\n\n        // Insert edges from max_layer down to 0\n        for layer in (0..=max_layer).rev() {\n            let candidates = if let Some(ref ep) = curr_ep {\n                self.search_layer(\n                    \u0026*nodes,\n                    \u0026normalized_vector,  \n                    Some(ep),\n                    1,\n                    layer,\n                ).await?\n            } else {\n                Vec::new()\n            };\n\n            // Update entry point for next layer\n            if !candidates.is_empty() {\n                curr_ep = Some(candidates[0].id.clone());\n            }\n\n            // Select neighbors for the current layer\n            let mut neighbors = Vec::new();\n            for candidate in candidates.iter() {\n                if neighbors.len() \u003e= self.config.max_connections {\n                    break;\n                }\n                neighbors.push(candidate.id.clone());\n            }\n\n            // Add connections\n            while new_node.connections.len() \u003c= layer {\n                new_node.connections.push(Vec::new());\n            }\n            new_node.connections[layer] = neighbors.clone();\n\n            // Add reverse connections\n            for neighbor_id in neighbors {\n                if let Some(neighbor) = nodes.get_mut(\u0026neighbor_id) {\n                    while neighbor.connections.len() \u003c= layer {\n                        neighbor.connections.push(Vec::new());\n                    }\n                    if !neighbor.connections[layer].contains(\u0026temporal.vector.id) {\n                        neighbor.connections[layer].push(temporal.vector.id.clone());\n                    }\n                }\n            }\n        }\n\n        // Update entry points if needed\n        if entry_points.len() \u003c= max_layer {\n            entry_points.resize(max_layer + 1, temporal.vector.id.clone());\n        }\n\n        // Insert the new node\n        nodes.insert(temporal.vector.id.clone(), new_node);\n\n        Ok(())\n    }\n\n    pub async fn search(\u0026self, query: \u0026[f32], k: usize) -\u003e Result\u003cVec\u003c(String, f32)\u003e\u003e {\n        self.validate_dimensions(query)?;\n\n        // Normalize query vector before search\n        let normalized_query = self.normalize_vector(query);\n\n        let nodes = self.nodes.read().await;\n        let entry_points = self.entry_points.read().await;\n\n        if nodes.is_empty() {\n            return Ok(Vec::new());\n        }\n\n        let candidates = if let Some(ep) = entry_points.last() {\n            self.search_layer(\n                \u0026*nodes,\n                \u0026normalized_query,  \n                Some(ep),\n                self.config.ef_search,\n                0,\n            ).await?\n        } else {\n            Vec::new()\n        };\n\n        // Convert candidates to final results\n        let mut scored_candidates: Vec\u003c_\u003e = candidates.into_iter()\n            .map(|c| {\n                let temporal_weight = self.config.temporal_weight;\n                let score = (1.0 - temporal_weight) * c.distance + \n                           temporal_weight * (1.0 - c.temporal_score);\n                (c.id, score, c.temporal_score)\n            })\n            .collect();\n\n        // Sort by combined score\n        scored_candidates.sort_by(|a, b| {\n            let (_, a_score, _) = a;\n            let (_, b_score, _) = b;\n            a_score.partial_cmp(b_score).unwrap()\n        });\n        \n        // Truncate and convert back to original format\n        scored_candidates.truncate(k);\n        Ok(scored_candidates.into_iter()\n            .map(|(id, score, _)| (id, score))\n            .collect())\n    }\n\n    #[allow(dead_code)]\n    fn temporal_score(\u0026self, id: \u0026str, now: SystemTime, nodes: \u0026HashMap\u003cString, Node\u003e) -\u003e f32 {\n        if let Some(node) = nodes.get(id) {\n            let age = now.duration_since(node.timestamp)\n                .unwrap_or(Duration::from_secs(0))\n                .as_secs_f32();\n            (-0.1 * age).exp()  // Exponential decay: 1.0 for now, decaying over time\n        } else {\n            0.0\n        }\n    }\n\n    async fn search_layer(\n        \u0026self,\n        nodes: \u0026HashMap\u003cString, Node\u003e,\n        query: \u0026[f32],\n        entry_point: Option\u003c\u0026String\u003e,\n        ef: usize,\n        layer: usize,\n    ) -\u003e Result\u003cVec\u003cCandidate\u003e\u003e {\n        use std::collections::BinaryHeap;\n\n        let mut visited = HashMap::new();\n        let mut candidates = BinaryHeap::new();\n        let mut best_candidates = BinaryHeap::new();\n\n        if let Some(ep) = entry_point {\n            if let Some(node) = nodes.get(ep) {\n                if layer \u003c node.connections.len() {\n                    let dist = self.distance_metric.calculate_distance(\u0026node.vector, query);\n                    visited.insert(ep.clone(), dist);\n                    let candidate = Candidate {\n                        id: ep.clone(),\n                        distance: dist,\n                        temporal_score: node.temporal_score,\n                    };\n                    candidates.push(candidate.clone());\n                    best_candidates.push(candidate);\n                }\n            }\n        }\n\n        while let Some(current) = candidates.pop() {\n            let worst_candidate = best_candidates.peek();\n            if let Some(worst) = worst_candidate {\n                // Use weighted score for comparison\n                let temporal_weight = self.config.temporal_weight;\n                let current_score = (1.0 - temporal_weight) * current.distance + \n                                  temporal_weight * (1.0 - current.temporal_score);\n                let worst_score = (1.0 - temporal_weight) * worst.distance + \n                                temporal_weight * (1.0 - worst.temporal_score);\n                if current_score \u003e worst_score {\n                    break;\n                }\n            }\n\n            if let Some(node) = nodes.get(\u0026current.id) {\n                if layer \u003c node.connections.len() {\n                    for neighbor_id in \u0026node.connections[layer] {\n                        if !visited.contains_key(neighbor_id) {\n                            if let Some(neighbor) = nodes.get(neighbor_id) {\n                                let dist = self.distance_metric.calculate_distance(\u0026neighbor.vector, query);\n                                visited.insert(neighbor_id.clone(), dist);\n                                \n                                let candidate = Candidate {\n                                    id: neighbor_id.clone(),\n                                    distance: dist,\n                                    temporal_score: neighbor.temporal_score,\n                                };\n                                \n                                // Use weighted score for comparison\n                                let temporal_weight = self.config.temporal_weight;\n                                let candidate_score = (1.0 - temporal_weight) * dist + \n                                                    temporal_weight * (1.0 - candidate.temporal_score);\n                                let should_add = if best_candidates.len() \u003c ef {\n                                    true\n                                } else {\n                                    let worst = best_candidates.peek().unwrap();\n                                    let worst_score = (1.0 - temporal_weight) * worst.distance + \n                                                    temporal_weight * (1.0 - worst.temporal_score);\n                                    candidate_score \u003c worst_score\n                                };\n                                \n                                if should_add {\n                                    candidates.push(candidate.clone());\n                                    best_candidates.push(candidate);\n                                    if best_candidates.len() \u003e ef {\n                                        best_candidates.pop();\n                                    }\n                                }\n                            }\n                        }\n                    }\n                }\n            }\n        }\n\n        let mut result: Vec\u003c_\u003e = best_candidates.into_iter().collect();\n        result.sort_by(|a, b| {\n            // Use weighted score for final sorting\n            let temporal_weight = self.config.temporal_weight;\n            let a_score = (1.0 - temporal_weight) * a.distance + \n                         temporal_weight * (1.0 - a.temporal_score);\n            let b_score = (1.0 - temporal_weight) * b.distance + \n                         temporal_weight * (1.0 - b.temporal_score);\n            a_score.partial_cmp(\u0026b_score).unwrap()\n        });\n        Ok(result)\n    }\n\n    fn get_random_layer(\u0026self) -\u003e usize {\n        let mut layer = 0;\n        while random::\u003cf32\u003e() \u003c 0.5 \u0026\u0026 layer \u003c self.config.max_dimensions {\n            layer += 1;\n        }\n        layer\n    }\n\n    fn validate_dimensions(\u0026self, vector: \u0026[f32]) -\u003e Result\u003c()\u003e {\n        if vector.len() != self.config.max_dimensions {\n            return Err(MemoryError::InvalidDimensions {\n                got: vector.len(),\n                expected: self.config.max_dimensions,\n            });\n        }\n        Ok(())\n    }\n\n    pub async fn get_layer_stats(\u0026self) -\u003e Result\u003cLayerStats\u003e {\n        let nodes = self.nodes.read().await;\n        let mut layer_sizes = HashMap::new();\n        let mut total_connections = 0;\n\n        for (_, node) in nodes.iter() {\n            let layer = node.layer;\n            *layer_sizes.entry(layer).or_insert(0) += 1;\n            total_connections += node.connections.iter().map(|c| c.len()).sum::\u003cusize\u003e();\n        }\n\n        let num_layers = if layer_sizes.is_empty() { 0 } else {\n            layer_sizes.keys().max().unwrap_or(\u00260) + 1\n        };\n\n        let total_nodes = nodes.len();\n        let avg_connections = if total_nodes \u003e 0 {\n            total_connections as f64 / total_nodes as f64\n        } else {\n            0.0\n        };\n\n        Ok(LayerStats {\n            num_layers,\n            total_nodes,\n            total_connections,\n            avg_connections,\n            layer_sizes,\n        })\n    }\n}\n\n#[derive(Debug)]\npub struct LayerStats {\n    pub num_layers: usize,\n    pub total_nodes: usize,\n    pub total_connections: usize,\n    pub avg_connections: f64,\n    pub layer_sizes: HashMap\u003cusize, usize\u003e,\n}\n","traces":[{"line":25,"address":[2163984],"length":1,"stats":{"Line":0}},{"line":51,"addre ],"length":1,"stats":{"Line":1}},{"line":417,"address":[2149851],"length":1,"stats":{"Line":1}},{"line":418,"address":[2149860],"length":1,"stats":{"Line":1}}],"covered":164,"coverable":180},{"path":["/","home","jt","chrono-mind","src","storage","metrics.rs"],"content":"#[cfg(target_arch = \"x86_64\")]\nuse std::arch::x86_64::*;\n\n/// Trait for implementing distance/similarity metrics\n#[async_trait::async_trait]\npub trait DistanceMetric: Send + Sync {\n    /// Calculate distance between two vectors\n    fn calculate_distance(\u0026self, a: \u0026[f32], b: \u0026[f32]) -\u003e f32;\n    /// Calculate similarity between two vectors\n    fn similarity(\u0026self, a: \u0026[f32], b: \u0026[f32]) -\u003e f32;\n    fn name(\u0026self) -\u003e \u0026'static str;\n}\n\n/// Cosine similarity implementation\n#[derive(Debug, Clone)]\npub struct CosineDistance;\n\nimpl CosineDistance {\n    /// Create a new CosineDistance instance\n    pub fn new() -\u003e Self {\n        Self\n    }\n\n    /// Normalize a vector to unit length\n    fn normalize_vector(v: \u0026[f32]) -\u003e Vec\u003cf32\u003e {\n        let magnitude = v.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n        if magnitude \u003e 1e-10 {  // Use small epsilon instead of 0.0\n            v.iter().map(|x| x / magnitude).collect()\n        } else {\n            vec![0.0; v.len()]  // Return zero vector for zero magnitude\n        }\n    }\n\n    #[cfg(target_arch = \"x86_64\")]\n    #[target_feature(enable = \"avx2,fma\")]\n    unsafe fn dot_product_avx2(a: \u0026[f32], b: \u0026[f32]) -\u003e f32 {\n        let mut sum = _mm256_setzero_ps();\n        let n = a.len() / 8 * 8;\n\n        for i in (0..n).step_by(8) {\n            let va = _mm256_loadu_ps(\u0026a[i]);\n            let vb = _mm256_loadu_ps(\u0026b[i]);\n            sum = _mm256_fmadd_ps(va, vb, sum);\n        }\n\n        // Horizontal sum of the 256-bit vector\n        let sum128 = _mm_add_ps(\n            _mm256_castps256_ps128(sum),\n            _mm256_extractf128_ps(sum, 1)\n        );\n        let sum64 = _mm_add_ps(sum128, _mm_movehl_ps(sum128, sum128));\n        let sum32 = _mm_add_ss(sum64, _mm_shuffle_ps(sum64, sum64, 1));\n        let mut result = 0.0;\n        _mm_store_ss(\u0026mut result, sum32);\n\n        // Handle remaining elements\n        for i in n..a.len() {\n            result += a[i] * b[i];\n        }\n\n        result\n    }\n}\n\nimpl DistanceMetric for CosineDistance {\n    fn calculate_distance(\u0026self, a: \u0026[f32], b: \u0026[f32]) -\u003e f32 {\n        // Handle edge cases\n        if a.is_empty() || b.is_empty() || a.len() != b.len() {\n            return 1.0;\n        }\n\n        // Check if either vector is zero\n        let a_zero = a.iter().all(|\u0026x| x.abs() \u003c 1e-10);\n        let b_zero = b.iter().all(|\u0026x| x.abs() \u003c 1e-10);\n        if a_zero || b_zero {\n            return 1.0;\n        }\n\n        let a_normalized = Self::normalize_vector(a);\n        let b_normalized = Self::normalize_vector(b);\n\n        #[cfg(target_arch = \"x86_64\")]\n        {\n            if is_x86_feature_detected!(\"avx2\") \u0026\u0026 is_x86_feature_detected!(\"fma\") {\n                unsafe {\n                    let dot_product = Self::dot_product_avx2(\u0026a_normalized, \u0026b_normalized);\n                    // Ensure dot product is in [-1, 1] and handle numerical instability\n                    let dot_product = dot_product.max(-1.0).min(1.0);\n                    return (1.0 - dot_product).max(0.0);\n                }\n            }\n        }\n\n        // Fallback for non-x86_64 architectures or when AVX2 is not available\n        let mut dot_product = 0.0;\n        for (x, y) in a_normalized.iter().zip(b_normalized.iter()) {\n            dot_product += x * y;\n        }\n        \n        // Ensure dot product is in [-1, 1] and handle numerical instability\n        let dot_product = dot_product.max(-1.0).min(1.0);\n        (1.0 - dot_product).max(0.0)\n    }\n\n    fn similarity(\u0026self, a: \u0026[f32], b: \u0026[f32]) -\u003e f32 {\n        if a.len() != b.len() || a.is_empty() {\n            return 0.0;\n        }\n\n        // Check if either vector is zero\n        let a_zero = a.iter().all(|\u0026x| x.abs() \u003c 1e-10);\n        let b_zero = b.iter().all(|\u0026x| x.abs() \u003c 1e-10);\n        if a_zero || b_zero {\n            return 0.0;\n        }\n\n        let a_normalized = Self::normalize_vector(a);\n        let b_normalized = Self::normalize_vector(b);\n\n        #[cfg(target_arch = \"x86_64\")]\n        {\n            if is_x86_feature_detected!(\"avx2\") \u0026\u0026 is_x86_feature_detected!(\"fma\") {\n                unsafe {\n                    let dot_product = Self::dot_product_avx2(\u0026a_normalized, \u0026b_normalized);\n                    return dot_product.max(-1.0).min(1.0);\n                }\n            }\n        }\n\n        // Fallback for non-x86_64 architectures or when AVX2 is not available\n        let mut dot_product = 0.0;\n        for (x, y) in a_normalized.iter().zip(b_normalized.iter()) {\n            dot_product += x * y;\n        }\n        dot_product.max(-1.0).min(1.0)\n    }\n\n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"cosine_simd\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_cosine_similarity() {\n        let metric = CosineDistance::new();\n        \n        // Test identical vectors\n        let v1 = vec![1.0, 0.0, 1.0];\n        assert!((metric.similarity(\u0026v1, \u0026v1) - 1.0).abs() \u003c 1e-6);\n\n        // Test orthogonal vectors\n        let v2 = vec![0.0, 1.0, 0.0];\n        assert!((metric.similarity(\u0026v1, \u0026v2) - 0.0).abs() \u003c 1e-6);\n\n        // Test similar vectors\n        let v3 = vec![1.0, 0.5, 1.0];\n        let sim = metric.similarity(\u0026v1, \u0026v3);\n        assert!(sim \u003e 0.9 \u0026\u0026 sim \u003c 1.0);\n\n        // Test empty vectors\n
